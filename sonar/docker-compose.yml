services:
  sonar-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes: [sonar_db:/var/lib/postgresql/data]
    networks: [devops-net]
  sonarqube:
    image: sonarqube:community
    depends_on: [sonar-db]
    ports: ["9000:9000"]
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes: [sonar_data:/opt/sonarqube/data, sonar_extensions:/opt/sonarqube/extensions, sonar_logs:/opt/sonarqube/logs]
    networks: [devops-net]
volumes: {sonar_db: {}, sonar_data: {}, sonar_extensions: {}, sonar_logs: {}}
networks:
  devops-net:
    external: true
