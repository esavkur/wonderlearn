server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  server_tokens off;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  location = /health { access_log off; add_header Content-Type text/plain; return 200 'ok'; }
  location = /config.js { add_header Cache-Control 'no-store, no-cache, must-revalidate'; }
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2|mjs)$ { expires 7d; add_header Cache-Control 'public, immutable'; try_files $uri =404; }
  location / { try_files $uri $uri/ /index.html; }
}
