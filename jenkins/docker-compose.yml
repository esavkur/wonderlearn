services:
  jenkins:
    build: .
    user: root
    ports: ["8080:8080", "50000:50000"]
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ../reports:/reports
    networks: [devops-net]
    restart: unless-stopped
volumes: {jenkins_home: {}}
networks:
  devops-net:
    external: true
